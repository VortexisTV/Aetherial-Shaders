# ============================================================
#  AETHERIAL SHADERS - shaders.properties
#  Cinematic modern-fantasy realism for Iris & OptiFine
# ============================================================

version=1.0.0

# --- Renderer behaviour -------------------------------------
oldLighting=false
oldHandLight=false
separateAo=false
underwaterOverlay=false
vignette=false
sun=true
moon=true
clouds=fancy

# --- Sliders shown in the option menu -----------------------
sliders=shadowMapResolution shadowDistance sunPathRotation SHADOW_SOFTNESS MIN_LIGHT EMISSIVE_STRENGTH VL_STRENGTH FOG_DENSITY CLOUD_COVERAGE WATER_WAVE_HEIGHT PUDDLE_AMOUNT BLOOM_INTENSITY EXPOSURE MB_STRENGTH DOF_STRENGTH SATURATION VIBRANCE CONTRAST TEMPERATURE NETHER_HAZE_STRENGTH LENS_FLARE_STRENGTH NIGHT_BRIGHTNESS

# --- Performance profiles -----------------------------------
profile.LOW=shadowMapResolution=1024 shadowDistance=112.0 SHADOW_PCF=1 SHADOW_SOFTNESS=1.0 !SSAO !GODRAYS !VOLUMETRIC_CLOUDS WATER_REFLECTIONS=1 SSR_STEPS=12 !WATER_CAUSTICS !RAIN_PUDDLES !MOTION_BLUR !DOF !LENS_FLARE BLOOM CLOUD_OCTAVES=3 VL_SAMPLES=8

profile.MEDIUM=shadowMapResolution=2048 shadowDistance=160.0 SHADOW_PCF=2 SHADOW_SOFTNESS=1.0 SSAO SSAO_QUALITY=1 GODRAYS VL_SAMPLES=12 VOLUMETRIC_CLOUDS CLOUD_OCTAVES=4 WATER_REFLECTIONS=2 SSR_STEPS=16 WATER_CAUSTICS RAIN_PUDDLES !MOTION_BLUR !DOF LENS_FLARE BLOOM

profile.HIGH=shadowMapResolution=3072 shadowDistance=192.0 SHADOW_PCF=3 SHADOW_SOFTNESS=1.25 SSAO SSAO_QUALITY=2 GODRAYS VL_SAMPLES=16 VOLUMETRIC_CLOUDS CLOUD_OCTAVES=5 WATER_REFLECTIONS=2 SSR_STEPS=24 WATER_CAUSTICS RAIN_PUDDLES !MOTION_BLUR !DOF LENS_FLARE BLOOM

profile.ULTRA=shadowMapResolution=4096 shadowDistance=256.0 SHADOW_PCF=3 SHADOW_SOFTNESS=1.5 SSAO SSAO_QUALITY=3 GODRAYS VL_SAMPLES=32 VOLUMETRIC_CLOUDS CLOUD_OCTAVES=6 WATER_REFLECTIONS=2 SSR_STEPS=32 WATER_CAUSTICS RAIN_PUDDLES MOTION_BLUR DOF LENS_FLARE BLOOM

# --- Option menu layout --------------------------------------
screen=<profile> <empty> [LIGHTING] [ATMOSPHERE] [WATER] [SURFACE] [CAMERA] [COLOR]

screen.LIGHTING=SHADOWS shadowMapResolution shadowDistance SHADOW_PCF SHADOW_SOFTNESS sunPathRotation <empty> SSAO SSAO_QUALITY MIN_LIGHT NIGHT_BRIGHTNESS EMISSIVE_STRENGTH HANDLIGHT

screen.ATMOSPHERE=GODRAYS VL_SAMPLES VL_STRENGTH FOG_DENSITY <empty> VOLUMETRIC_CLOUDS CLOUD_OCTAVES CLOUD_COVERAGE <empty> NETHER_HAZE_STRENGTH

screen.WATER=WATER_REFLECTIONS SSR_STEPS WATER_REFRACTION WATER_CAUSTICS WATER_WAVES WATER_WAVE_HEIGHT

screen.SURFACE=WAVING_LEAVES WAVING_PLANTS RAIN_PUDDLES PUDDLE_AMOUNT

screen.CAMERA=BLOOM BLOOM_INTENSITY <empty> AUTO_EXPOSURE EXPOSURE <empty> MOTION_BLUR MB_STRENGTH DOF DOF_STRENGTH <empty> LENS_FLARE LENS_FLARE_STRENGTH VIGNETTE

screen.COLOR=COLOR_GRADING SATURATION VIBRANCE CONTRAST TEMPERATURE
